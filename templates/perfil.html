<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil físico</title>
</head>
<body>

    <h2>Mi Perfil Físico</h2>

    <a href="{{ url_for('dashboard') }}">Volver al dashboard</a> |
    <a href="{{ url_for('auth.logout') }}">Cerrar sesión</a>

    <hr>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <label>Edad:</label><br>
        <input type="number" name="edad" value="{{ perfil.edad if perfil else '' }}" required>
        <br><br>

        <label>Peso (kg):</label><br>
        <input type="number" step="0.1" name="peso" value="{{ perfil.peso if perfil else '' }}" required>
        <br><br>

        <label>Altura (cm):</label><br>
        <input type="number" step="0.1" name="altura" value="{{ perfil.altura if perfil else '' }}" required>
        <br><br>

        <label>Contextura:</label><br>
        <select name="contextura" required>
            <option value="">Seleccione una contextura</option>
            <option value="Delgada" {% if perfil and perfil.contextura == "Delgada" %}selected{% endif %}>Delgada</option>
            <option value="Media" {% if perfil and perfil.contextura == "Media" %}selected{% endif %}>Media</option>
            <option value="Robusta" {% if perfil and perfil.contextura == "Robusta" %}selected{% endif %}>Robusta</option>
        </select>
        <br><br>

        <label>Nivel de actividad:</label><br>
        <select name="nivel_actividad" required>
            <option value="">Seleccione un nivel</option>
            <option value="Bajo" {% if perfil and perfil.nivel_actividad == "Bajo" %}selected{% endif %}>Bajo</option>
            <option value="Moderado" {% if perfil and perfil.nivel_actividad == "Moderado" %}selected{% endif %}>Moderado</option>
            <option value="Alto" {% if perfil and perfil.nivel_actividad == "Alto" %}selected{% endif %}>Alto</option>
        </select>
        <br><br>

        <label>Objetivo:</label><br>
        <select name="objetivo" required>
            <option value="">Seleccione un objetivo</option>
            <option value="Perder peso" {% if perfil and perfil.objetivo == "Perder peso" %}selected{% endif %}>Perder peso</option>
            <option value="Ganar masa muscular" {% if perfil and perfil.objetivo == "Ganar masa muscular" %}selected{% endif %}>Ganar masa muscular</option>
            <option value="Mejorar resistencia" {% if perfil and perfil.objetivo == "Mejorar resistencia" %}selected{% endif %}>Mejorar resistencia</option>
            <option value="Mantener condición física" {% if perfil and perfil.objetivo == "Mantener condición física" %}selected{% endif %}>Mantener condición física</option>
        </select>
        <br><br>

        <button type="submit">
            {% if perfil %}
                Actualizar perfil
            {% else %}
                Guardar perfil
            {% endif %}
        </button>

    </form>

</body>
</html>
