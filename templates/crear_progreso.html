<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar progreso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">

    <h2>Registrar Progreso</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <label>Fecha:</label><br>
        <input type="date" name="fecha" required>
        <br><br>

        <label>Peso actual (kg):</label><br>
        <input type="number" step="0.1" name="peso_actual" required>
        <br><br>

        <label>Porcentaje de grasa (%):</label><br>
        <input type="number" step="0.1" name="porcentaje_grasa" required>
        <br><br>

        <label>Observación:</label><br>
        <textarea name="observacion"></textarea>
        <br><br>

        <button type="submit">Guardar progreso</button>

    </form>

    <br>
    <a href="{{ url_for('progreso.listar_progresos') }}">Volver</a>
    </div>
</body>
</html>
