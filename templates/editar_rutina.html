<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Rutina</title>
</head>
<body>

    <h2>Editar Rutina</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" value="{{ rutina.nombre }}" required><br><br>

        <label>Descripción:</label><br>
        <textarea name="descripcion" required>{{ rutina.descripcion }}</textarea><br><br>

        <label>Nivel:</label><br>
        <select name="nivel" required>
            <option value="Principiante" {% if rutina.nivel == "Principiante" %}selected{% endif %}>Principiante</option>
            <option value="Intermedio" {% if rutina.nivel == "Intermedio" %}selected{% endif %}>Intermedio</option>
            <option value="Avanzado" {% if rutina.nivel == "Avanzado" %}selected{% endif %}>Avanzado</option>
        </select><br><br>

        <label>Objetivo:</label><br>
        <select name="objetivo" required>
            <option value="Perder peso" {% if rutina.objetivo == "Perder peso" %}selected{% endif %}>Perder peso</option>
            <option value="Ganar masa muscular" {% if rutina.objetivo == "Ganar masa muscular" %}selected{% endif %}>Ganar masa muscular</option>
            <option value="Mejorar resistencia" {% if rutina.objetivo == "Mejorar resistencia" %}selected{% endif %}>Mejorar resistencia</option>
            <option value="Mantener condición física" {% if rutina.objetivo == "Mantener condición física" %}selected{% endif %}>Mantener condición física</option>
        </select><br><br>

        <button type="submit">Actualizar</button>
    </form>

    <br>
    <a href="{{ url_for('rutina.listar_rutinas') }}">Volver</a>

</body>
</html>
