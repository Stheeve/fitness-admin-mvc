<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Comida</title>
</head>
<body>

    <h2>Crear Comida</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required><br><br>

        <label>Tipo de comida:</label><br>
        <select name="tipo" required>
            <option value="">Seleccione un tipo</option>
            <option value="Desayuno">Desayuno</option>
            <option value="Almuerzo">Almuerzo</option>
            <option value="Cena">Cena</option>
            <option value="Snack">Snack</option>
        </select><br><br>

        <label>Calorías:</label><br>
        <input type="number" name="calorias" required><br><br>

        <label>Proteínas (g):</label><br>
        <input type="number" step="0.1" name="proteinas" required><br><br>

        <label>Carbohidratos (g):</label><br>
        <input type="number" step="0.1" name="carbohidratos" required><br><br>

        <label>Grasas (g):</label><br>
        <input type="number" step="0.1" name="grasas" required><br><br>

        <button type="submit">Guardar</button>
    </form>

    <br>
    <a href="{{ url_for('comida.listar_comidas') }}">Volver</a>

</body>
</html>
