<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Comida</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
    <h2>Editar Comida</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" value="{{ comida.nombre }}" required><br><br>

        <label>Tipo de comida:</label><br>
        <select name="tipo" required>
            <option value="Desayuno" {% if comida.tipo == "Desayuno" %}selected{% endif %}>Desayuno</option>
            <option value="Almuerzo" {% if comida.tipo == "Almuerzo" %}selected{% endif %}>Almuerzo</option>
            <option value="Cena" {% if comida.tipo == "Cena" %}selected{% endif %}>Cena</option>
            <option value="Snack" {% if comida.tipo == "Snack" %}selected{% endif %}>Snack</option>
        </select><br><br>

        <label>Calorías:</label><br>
        <input type="number" name="calorias" value="{{ comida.calorias }}" required><br><br>

        <label>Proteínas (g):</label><br>
        <input type="number" step="0.1" name="proteinas" value="{{ comida.proteinas }}" required><br><br>

        <label>Carbohidratos (g):</label><br>
        <input type="number" step="0.1" name="carbohidratos" value="{{ comida.carbohidratos }}" required><br><br>

        <label>Grasas (g):</label><br>
        <input type="number" step="0.1" name="grasas" value="{{ comida.grasas }}" required><br><br>

        <button type="submit">Actualizar</button>
    </form>

    <br>
    <a href="{{ url_for('comida.listar_comidas') }}">Volver</a>
    </div>
</body>
</html>
